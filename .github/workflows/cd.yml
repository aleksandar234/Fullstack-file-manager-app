name: CD - Deploy to VM

on:
  push:
    branches:
      - cloud-si-separation

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.101.134.200
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/app
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f