<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="/public/css/login.css">
</head>

<body>
    <div class="login-box">
        <h2>Register</h2>

        <form id="registerForm">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required />
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required />
            </div>

            <div class="input-group">
                <label for="conformationPassword">Conformation Password</label>
                <input type="password" id="conformationPassword" name="conformationPassword" required />
            </div>

            <button type="submit">Register</button>

            <p class="register-link">
                Already have an account? <a href="/views/loginPage.html">Login</a>
            </p>
        </form>
    </div>

    <script>
        const API_BASE =
            window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
                ? "http://localhost:3000"
                : `http://${window.location.hostname}:3001`;

        document.getElementById("registerForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const conformationPassword = document.getElementById("conformationPassword").value;

            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: "POST",
                    credentials: "include",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: new URLSearchParams({
                        email,
                        password,
                        conformationPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(data.message);
                    window.location.href = "/views/loginPage.html";
                } else {
                    alert(data.message);
                }
            } catch (error) {
                console.error("Register error:", error);
                alert("Doslo je do greske pri registraciji");
            }
        });
    </script>
</body>
</html>
